apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-core
  namespace: argocd

spec:
  source:
    helm:
      valuesObject:
        global:
          clusterName: cace-1-dev
        bootstrap:
          crossplane:
            dynamicDns:
              enabled: true
              recordName: vpn
              zoneName: dramisinfo.com
              resourceGroupName: rg-dns
              subscriptionId: c1d22d5c-418b-4bd9-ba23-5e806c376b56
              ttl: 300
          cnpg:
            enabled: true
          argocd:
            smeeUrl: "https://smee.io/AC2s1ASzSClbnZxI"
          nats:
            enabled: false
            gateway:
              enabled: true
              name: "cace-1-dev-cluster"
              advertise: "nats.cace-1-dev.dramisinfo.com:7222"
              gateways:
                - name: "cace-2-dev-cluster"
                  url: "nats://nats.cace-2-dev.dramisinfo.com:7222"
  syncPolicy:
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
