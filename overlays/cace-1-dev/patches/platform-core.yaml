apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-core
  namespace: argocd

spec:
  source:
    helm:
      valuesObject:
        global:
          clusterName: cace-1-dev
        bootstrap:
          gatekeeper:
            policies:
              excludedNamespaces:
                - kube-system
                - gatekeeper-system
                - cert-manager
                - istio-system
                - argocd
                - azure-arc
                - it-gitops-enterprise-prd
          monitoring:
            enabled: false
          argocd:
            smeeUrl: "https://smee.io/AC2s1ASzSClbnZxI"
          nats:
            enabled: true
            # Gateway to cace-2-dev removed 2026-06-23 — that cluster no longer exists,
            # and the gateway connection was blocking JetStream metadata RAFT from
            # electing a leader (constant "no metadata leader" warnings).
            gateway:
              enabled: false
              name: "cace-1-dev-cluster"
              advertise: "nats.cace-1-dev.dramisinfo.com:7222"
              gateways: []
  syncPolicy:
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
